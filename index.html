<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WawaMaze</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
  </head>
  <body>
    <canvas id="darkness-overlay"></canvas>
    
    <!-- HUD will be generated dynamically by createHUD() in main.ts -->
    
    <div id="help-ui">
      <h3>Controls</h3>
      <p>WASD / Arrow Keys: Move</p>
      <p>B: Bounding Debug</p>
      <p>L: Lighting Debug</p>
      <p>I: Surfel GI ON/OFF</p>
      <p>G: Surfel Debug</p>
      <p>H: Help UI Toggle</p>
    </div>

    <div id="start-ui" style="display: flex;">
      <div class="modal">
        <h1>Wawa Maze</h1>
        <p>어둠 속의 미로를 탐험하세요!</p>
        <ul class="rules-list">
          <li><strong>WASD / 방향키</strong>로 이동합니다.</li>
          <li>맵 곳곳에 숨겨진 <strong>빛나는 코인</strong>을 모아주세요.</li>
          <li>코인을 먹으면 잠시 동안 시야가 넓어집니다.</li>
          <li>무사히 <strong>출구(초록색)</strong>를 찾아 탈출하면 게임 클리어!</li>
        </ul>
        <button id="start-btn">게임 시작</button>
      </div>
    </div>

    <div id="clear-ui" style="display: none; pointer-events: auto;">
      <h1>CLEAR!</h1>
      <h2 id="final-score">Final Score: 5</h2>
      <button id="restart-btn">Restart Game</button>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
